name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-build:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Install Swift 6.2.1
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.2.1-release
          swift-build: 6.2.1-RELEASE
          update-sdk-modules: true
          cache: true

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Toolchain versions
        shell: pwsh
        run: |
          swift --version
          swift package --version
          dotnet --info

      - name: Build and package Windows app
        id: package
        shell: pwsh
        run: |
          ./Windows/package-windows.ps1 `
            -ReleaseTag "ci-${{ github.sha }}" `
            -OutputRoot "$env:RUNNER_TEMP\codexbar-windows"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: codexbar-windows-x86_64
          path: ${{ steps.package.outputs.package_dir }}
