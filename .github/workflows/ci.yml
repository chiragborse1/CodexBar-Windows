name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
      - "NOTICE"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
      - "NOTICE"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-fast:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Toolchain version
        shell: pwsh
        run: |
          dotnet --info

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $scripts = @(
            "Windows\dev-run.ps1",
            "Windows\install.ps1",
            "Windows\package-windows.ps1",
            "Windows\ui-dev.ps1",
            "Windows\uninstall.ps1"
          )
          foreach ($script in $scripts) {
            [scriptblock]::Create((Get-Content -Raw $script)) | Out-Null
          }

      - name: Build Windows app
        shell: pwsh
        run: |
          dotnet build Windows\CodexBar.Windows\CodexBar.Windows.csproj -c Debug

      - name: App smoke tests
        shell: pwsh
        run: |
          $app = Join-Path $PWD "Windows\CodexBar.Windows\bin\Debug\net8.0-windows10.0.17763.0\CodexBar-Windows.exe"
          & $app --smoke-test
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $app --pty-bridge-smoke-test
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
