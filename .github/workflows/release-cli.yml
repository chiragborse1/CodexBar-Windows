name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to (for example, v0.24)."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runs-on: ubuntu-24.04
            platform: linux
            asset-arch: x86_64
            build-arch: ""
            static-swift-stdlib: true
          - name: linux-arm64
            runs-on: ubuntu-24.04-arm
            platform: linux
            asset-arch: aarch64
            build-arch: ""
            static-swift-stdlib: true
          - name: macos-arm64
            runs-on: macos-15
            platform: macos
            asset-arch: arm64
            build-arch: arm64
            static-swift-stdlib: false
          - name: macos-x86_64
            runs-on: macos-15-intel
            platform: macos
            asset-arch: x86_64
            build-arch: x86_64
            static-swift-stdlib: false
    runs-on: ${{ matrix.runs-on }}
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26.1.1 (if present) or fallback to default
        if: matrix.platform == 'macos'
        run: |
          set -euo pipefail
          for candidate in /Applications/Xcode_26.1.1.app /Applications/Xcode_26.1.app /Applications/Xcode.app; do
            if [[ -d "$candidate" ]]; then
              sudo xcode-select -s "${candidate}/Contents/Developer"
              echo "DEVELOPER_DIR=${candidate}/Contents/Developer" >> "$GITHUB_ENV"
              break
            fi
          done
          /usr/bin/xcodebuild -version

      - name: Runner info
        run: |
          set -euo pipefail
          uname -a
          uname -m
          swift --version

      - name: Install Swift 6.2.1 via swiftly
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v gpg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ca-certificates gpg
          fi

          SWIFTLY_ARCH="$(uname -m)"
          SWIFTLY_HOME_DIR="$HOME/.local/share/swiftly"
          SWIFTLY_BIN_DIR="$HOME/.local/bin"
          POST_INSTALL_SCRIPT="$(mktemp)"

          mkdir -p "$SWIFTLY_BIN_DIR"
          curl -fsSL "https://download.swift.org/swiftly/linux/swiftly-${SWIFTLY_ARCH}.tar.gz" -o /tmp/swiftly.tar.gz
          tar -xzf /tmp/swiftly.tar.gz -C /tmp
          /tmp/swiftly init --assume-yes --skip-install

          . "$SWIFTLY_HOME_DIR/env.sh"
          echo "$SWIFTLY_BIN_DIR" >> "$GITHUB_PATH"
          echo "SWIFTLY_HOME_DIR=$SWIFTLY_HOME_DIR" >> "$GITHUB_ENV"
          echo "SWIFTLY_BIN_DIR=$SWIFTLY_BIN_DIR" >> "$GITHUB_ENV"

          swiftly install 6.2.1 --use --assume-yes --post-install-file "$POST_INSTALL_SCRIPT"
          if [[ -s "$POST_INSTALL_SCRIPT" ]]; then
            sudo apt-get update
            sudo bash "$POST_INSTALL_SCRIPT"
          fi

          hash -r
          swift --version

      - name: Build CodexBarCLI (release)
        id: build
        shell: bash
        run: |
          set -euo pipefail

          BUILD_ARGS=(swift build -c release --product CodexBarCLI)
          if [[ -n "${{ matrix.build-arch }}" ]]; then
            BUILD_ARGS+=(--arch "${{ matrix.build-arch }}")
          fi
          if [[ "${{ matrix.static-swift-stdlib }}" == "true" ]]; then
            BUILD_ARGS+=(--static-swift-stdlib)
          fi
          "${BUILD_ARGS[@]}"

          SHOW_BIN_ARGS=(swift build -c release --product CodexBarCLI --show-bin-path)
          if [[ -n "${{ matrix.build-arch }}" ]]; then
            SHOW_BIN_ARGS+=(--arch "${{ matrix.build-arch }}")
          fi
          if [[ "${{ matrix.static-swift-stdlib }}" == "true" ]]; then
            SHOW_BIN_ARGS+=(--static-swift-stdlib)
          fi

          echo "bin_dir=$("${SHOW_BIN_ARGS[@]}")" >> "$GITHUB_OUTPUT"

      - name: Smoke test CodexBarCLI
        timeout-minutes: 5
        shell: bash
        run: |
          set -euo pipefail

          BIN_DIR="${{ steps.build.outputs.bin_dir }}"
          BIN="$BIN_DIR/CodexBarCLI"
          run_with_timeout() {
            local output="$1"
            shift
            "$@" > "$output" &
            local pid=$!
            local run_status=
            for _ in {1..20}; do
              if ! kill -0 "$pid" 2>/dev/null; then
                set +e
                wait "$pid"
                run_status=$?
                set -e
                break
              fi
              sleep 1
            done
            if [[ -z "$run_status" ]]; then
              kill "$pid" 2>/dev/null || true
              wait "$pid" 2>/dev/null || true
              echo "$* timed out." >&2
              exit 124
            fi
            if [[ "$run_status" -ne 0 ]]; then
              cat "$output" >&2 || true
              exit "$run_status"
            fi
          }

          echo "BIN=$BIN"
          file "$BIN"
          if [[ "${{ matrix.platform }}" == "macos" ]]; then
            lipo -archs "$BIN" | tr ' ' '\n' | grep -Fx "${{ matrix.asset-arch }}"
            run_with_timeout "$RUNNER_TEMP/codexbar-cli-smoke-${{ matrix.name }}.txt" "$BIN" config validate --format json
          else
            run_with_timeout "$RUNNER_TEMP/codexbar-cli-help-${{ matrix.name }}.txt" "$BIN" --help
            file "$BIN" | grep -q "${{ matrix.asset-arch }}"
          fi
          printf '%s\n' "${RELEASE_TAG#v}" > "$BIN_DIR/VERSION"
          VERSION_OUTPUT="$RUNNER_TEMP/codexbar-cli-version-${{ matrix.name }}.txt"
          run_with_timeout "$VERSION_OUTPUT" "$BIN" --version
          grep -Fx "CodexBar-Windows ${RELEASE_TAG#v}" "$VERSION_OUTPUT"
          rm "$BIN_DIR/VERSION"

      - name: Package
        id: pkg
        shell: bash
        run: |
          set -euo pipefail

          REF_NAME="${RELEASE_TAG}"
          if [[ -z "$REF_NAME" ]]; then
            echo "Missing release tag." >&2
            exit 1
          fi
          SAFE_REF_NAME="${REF_NAME//\//-}"

          BIN_DIR="${{ steps.build.outputs.bin_dir }}"
          OUT_DIR="$(mktemp -d)"
          install -m 0755 "$BIN_DIR/CodexBarCLI" "$OUT_DIR/CodexBarCLI"
          ln -s "CodexBarCLI" "$OUT_DIR/codexbar"
          printf '%s\n' "${SAFE_REF_NAME#v}" > "$OUT_DIR/VERSION"

          ASSET="CodexBarCLI-${SAFE_REF_NAME}-${{ matrix.platform }}-${{ matrix.asset-arch }}.tar.gz"
          (cd "$OUT_DIR" && tar czf "$ASSET" CodexBarCLI codexbar VERSION)
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$OUT_DIR/$ASSET" > "$OUT_DIR/$ASSET.sha256"
          else
            shasum -a 256 "$OUT_DIR/$ASSET" > "$OUT_DIR/$ASSET.sha256"
          fi

          echo "out_dir=$OUT_DIR" >> "$GITHUB_OUTPUT"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        if: github.event_name == 'release' || inputs.tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          OUT_DIR="${{ steps.pkg.outputs.out_dir }}"
          ASSET="${{ steps.pkg.outputs.asset }}"
          gh release upload "$TAG" "$OUT_DIR/$ASSET" "$OUT_DIR/$ASSET.sha256" --clobber

      - name: Upload workflow artifact (manual runs)
        if: github.event_name != 'release' && inputs.tag == ''
        uses: actions/upload-artifact@v6
        with:
          name: codexbar-cli-${{ matrix.name }}
          path: |
            ${{ steps.pkg.outputs.out_dir }}/${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.out_dir }}/${{ steps.pkg.outputs.asset }}.sha256

  build-windows-cli:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Swift 6.2.1
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.2.1-release
          swift-build: 6.2.1-RELEASE
          update-sdk-modules: true
          cache: true

      - name: Swift toolchain version
        shell: pwsh
        run: swift --version

      - name: Build CodexBarCLI
        shell: pwsh
        run: swift build -c release --product CodexBarCLI

      - name: Smoke test CodexBarCLI
        shell: pwsh
        run: |
          $binDir = swift build -c release --product CodexBarCLI --show-bin-path
          $bin = Join-Path $binDir "CodexBarCLI.exe"
          & $bin --help | Out-Null
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $bin --version | Out-Null
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Publish Windows tray app
        shell: pwsh
        run: |
          dotnet publish Windows/CodexBar.Windows/CodexBar.Windows.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            /p:PublishSingleFile=false

      - name: Package
        id: pkg
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_TAG)) {
            Write-Error "Missing release tag."
            exit 1
          }

          $safeRef = $env:RELEASE_TAG.Replace("/", "-")
          $version = $safeRef.TrimStart("v")
          $binDir = swift build -c release --product CodexBarCLI --show-bin-path
          $bin = Join-Path $binDir "CodexBarCLI.exe"
          $publishDir = Join-Path $PWD "Windows\CodexBar.Windows\bin\Release\net8.0-windows10.0.17763.0\win-x64\publish"
          $outDir = Join-Path $env:RUNNER_TEMP "codexbar-windows-x86_64"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          Copy-Item (Join-Path $publishDir "*") $outDir -Recurse -Force
          Copy-Item $bin (Join-Path $outDir "CodexBarCLI.exe") -Force
          Copy-Item "Windows\CodexBar.Windows\README_RUN.txt" (Join-Path $outDir "README_RUN.txt") -Force
          Set-Content -Path (Join-Path $outDir "VERSION") -Value $version -NoNewline

          $app = Join-Path $outDir "CodexBar-Windows.exe"
          & $app --smoke-test
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $asset = "CodexBar-Windows-$safeRef-windows-x86_64.zip"
          $assetPath = Join-Path $env:RUNNER_TEMP $asset
          Compress-Archive -Path (Join-Path $outDir "*") -DestinationPath $assetPath -Force

          $hash = (Get-FileHash -Algorithm SHA256 $assetPath).Hash.ToLowerInvariant()
          Set-Content -Path "$assetPath.sha256" -Value "$hash  $asset"
          "out_dir=$env:RUNNER_TEMP" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "asset=$asset" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload release assets
        if: github.event_name == 'release' || inputs.tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          $outDir = "${{ steps.pkg.outputs.out_dir }}"
          $asset = "${{ steps.pkg.outputs.asset }}"
          gh release upload $tag (Join-Path $outDir $asset) (Join-Path $outDir "$asset.sha256") --clobber

      - name: Upload workflow artifact (manual runs)
        if: github.event_name != 'release' && inputs.tag == ''
        uses: actions/upload-artifact@v6
        with:
          name: codexbar-windows-x86_64
          path: |
            ${{ steps.pkg.outputs.out_dir }}/${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.out_dir }}/${{ steps.pkg.outputs.asset }}.sha256
