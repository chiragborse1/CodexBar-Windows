name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to, for example v0.1.0."
        required: false
        type: string

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Swift 6.2.1
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.2.1-release
          swift-build: 6.2.1-RELEASE
          update-sdk-modules: true
          cache: true

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Toolchain versions
        shell: pwsh
        run: |
          swift --version
          swift package --version
          dotnet --info

      - name: Build and package Windows app
        id: package
        shell: pwsh
        run: |
          ./Windows/package-windows.ps1 `
            -ReleaseTag "$env:RELEASE_TAG" `
            -OutputRoot "$env:RUNNER_TEMP\codexbar-windows"

      - name: Upload release assets
        if: github.event_name == 'release' || inputs.tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release upload "$env:RELEASE_TAG" `
            "${{ steps.package.outputs.asset_path }}" `
            "${{ steps.package.outputs.sha256_path }}" `
            --clobber

      - name: Upload workflow artifact
        if: github.event_name != 'release' && inputs.tag == ''
        uses: actions/upload-artifact@v6
        with:
          name: codexbar-windows-x86_64
          path: ${{ steps.package.outputs.package_dir }}
